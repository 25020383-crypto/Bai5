name: CI Build and Test - Matrix

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout ma nguon
        uses: actions/checkout@v4

      - name: Cai dat Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # BƯỚC NÂNG CẤP CHO BÀI 5: Dùng lệnh 'verify' để kích hoạt luật 80% của JaCoCo
      - name: Kiem tra Code Coverage voi JaCoCo
        run: mvn clean verify

      # BƯỚC NÂNG CẤP CHO BÀI 5: Trích xuất và lưu báo cáo HTML
      - name: Luu bao cao JaCoCo (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.os }} # Tên file tải về có kèm tên hệ điều hành
          path: target/site/jacoco/            # Đường dẫn chứa báo cáo của JaCoCo